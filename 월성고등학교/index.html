<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>월성고등학교</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <!-- 헤더 -->
    <header>
        <!-- 네비게이션 바1 -->
        <nav>
            <!-- 로고 텍스트 -->
            <h1 class="logo">월성고등학교 마인크래프트</h1>
        </nav>
        <!-- 메뉴 아코디언 -->
        <ul class="top-menu">
            <li>
                <label for="first">Home</label>
            </li>
            <li>
                <label for="second">신청내용</label>
            </li>
            <li>
                <label for="third">서버일정</label>
            </li>
            <li>
                <label for="fourth">공지사항</label>
            </li>
        </ul>


        <div class="header-content">
            <h1>모집 기간 06.23(월) ~ 07.21(월)</h1>
            <!-- 신청폼 링크 -->
            <button></button>
        </div>
        
    </header>
    
    <main>
        <section>
            <!-- 신청정보 -->
            <h2>신청현황</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-lable">신청서 등록</span>
                    <span class="stat-value" id="avg">-</span>
                    <span class="stat-unit">건</span>
                </div>
                <div class="stat-card">
                    <span class="stat-lable">최다 신청 과목</span>
                    <span class="stat-value" id="max">-</span>
                    <span class="stat-unit"></span>
                </div>
                <div class="stat-card">
                    <span class="stat-lable">최소 신청 과목</span>
                    <span class="stat-value" id="min">-</span>
                    <span class="stat-unit"></span>
                </div>
                <!-- <div class="stat-card">
                    <span class="stat-lable">최고 조회수</span>
                    <span class="stat-value" id="avg25">72</span>
                    <span class="stat-unit">건</span>
                </div> -->
            </div>
            </section>

        <!-- 서버 정보 섹션 -->
        <section>
            <h2>과목 정보</h2>
            <div class="search-content">          
                <!-- 카테고리 버튼 -->
                <div class="search-category">
                    <div class="b1"><button><i class="fa-solid fa-gears"></i>국어</button></div>
                    <div class="b2"><button><i class="fa-solid fa-bolt"></i>수학</button></div>
                    <div class="b3"><button><i class="fa-regular fa-cloud"></i>사회</button></div>
                    <div class="b4"><button><i class="fa-solid fa-flask"></i>과학</button></div>
                    <div class="b5"><button><i class="fa-solid fa-dna"></i>영어</button></div>
                    <div class="b8"><button><i class="fa-solid fa-c"></i>도덕</button></div>
                    <div class="b8"><button><i class="fa-solid fa-c"></i>음악</button></div>
                    <div class="b6"><button><i class="fa-solid fa-battery-three-quarters"></i>미술</button></div>
                    <div class="b7"><button><i class="fa-solid fa-hands-holding"></i>체육</button></div>
                    

                </div>
            </div>
            

        </section>
    </main>
    

    <!-- 푸터 -->
    <footer>
        <!-- 저작권 표시 -->
        <div class="copyright">
            <p>Copyright &copy; 하사렌. ALL rights reserved.</p>
        </div>
    </footer>
</body>
</html>
