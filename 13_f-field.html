<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레드향 주문하기</title>
</head>
<body>
    <h1>레드향 주문하기</h1>
    <form action="">
        <fieldset>
            <!-- 배송정보 입력 폼 -->
            <legend>배송정보</legend>
            <ul>
                <li><label for="user-name">이름 <input type="text" id="user-name"></label></li>
                <li><label for="user-addr">배송 주소 <input type="text" id="user-addr"></label></li>
                <li><label for="user-email">이메일 <input type="email" id="user-email"></label></li>
                <li><label for="user-tel">연락처 <input type="tel" id="user-tel"></label></li>
            </ul>
        </fieldset>
        
        <fieldset>
            <!-- 라디오 버튼과 체크 박스 -->
            <legend>상품 선택</legend>
            <p><b>주문할 상품을 선택해 주세요</b></p>
            <ul>
                <li><label for="">선물용 3kg <input type="checkbox"></label></li>
                <li><label for="">선물용 5kg <input type="checkbox" name="" id=""></label></li>
                <li><label for="">가정용 3kg <input type="checkbox" name="" id=""></label></li>
                <li><label for="">가정용 5kg <input type="checkbox" name="" id=""></label></li>
            </ul>
            <p><b>포장 선택</b></p>
            <ul>
                <li><label for=""><input type="radio" name="" id="" value="yes">선물 포장</label></li>
                <li><label for=""><input type="radio" name="" id="" value="no">선물 포장 안함</label></li>
            </ul>
            
        </fieldset>
    </form>
</body>
</html>
