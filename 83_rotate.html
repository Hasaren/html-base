<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rotate</title>
    <style>
        .container {
            width: 800px;
            height: 200px;
            margin: 20px auto;
        }
        .origin {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            margin: 40px;
        }
        .origin > div {
            width: 100px;
            height: 100px;
            background-color: orange;
            transition: 0.5s;
        }
        #rotate1:hover {
            transform: rotate(40deg);
        }
        #rotate2:hover {
            transform: rotate(-40deg);
        }
        #scalexy:hover {
            transform: scaleX(2) scaleY(2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="origin">
            <div id="rotate1"></div>
        </div>
        <div class="origin">
            <div id="rotate2"></div>
        </div>
        <div class="origin">
            <div id="scalexy"></div>
        </div>
    </div>
</body>
</html>
