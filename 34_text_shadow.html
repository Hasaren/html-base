<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- 내부 스타일 -->
    <style>
        /* body {
            background: url('./images/1리락쿠마.jpg') no-repeat fixed;
            background-size: cover;
            text-align: center;
        } */
        h1 {
            font-size: 60px;
            color: rgba(red, green, blue, alpha);
        }
        p {font-size: 50px;}
        .trans1 {
            text-transform: capitalize;
        }
        .trans2 {
            text-transform: uppercase;
        }
        .trans3 {
            text-transform: lowercase;
        }
        .spacing1 {
            letter-spacing: 0.2em;
        }
        .spacing2 {
            letter-spacing: 0.5em;
        }
    </style>
</head>
<body>
    <h1 style="color: red;text-shadow: 3px 3px black;">HTML</h1>
    <h1 style="text-shadow: 5px 5px 3px #ffa500;">CSS</h1>
    <h1 style="color:white;text-shadow: 7px -7px 20px black;">JAVA</h1>

    <br>
    <p class="trans1">html</p>
    <p class="trans2">css</p>
    <p class="trans3">JAVA</p>
    <br>
    <p>CSS</p>
    <p class="spacing1">CSS</p>
    <p class="spacing2">CSS</p>
</body>
</html>
