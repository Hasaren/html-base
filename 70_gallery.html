<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .gallery {
            width: 700px;
            margin: 20px auto;
            display: grid;
            grid-template-areas: 
            "photo1 photo1 photo2"
            "photo1 photo1 photo3"
            "photo4 photo5 photo6";
            gap: 5px;
        }
        .gallery img {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            object-fit: cover;
        }
        .photo1 {
            grid-area: photo1;
        }
        .photo2 {
            grid-area: photo2;
        }
        .photo3 {
            grid-area: photo3;
        }
        .photo4 {
            grid-area: photo4;
        }
        .photo5 {
            grid-area: photo5;
        }
        .photo6 {
            grid-area: photo6;
        }
    </style>
</head>
<body>
    <div class="gallery">
        <img src="images/1리락쿠마.jpg" alt="" class="photo1">
        <img src="images/bear.jpg" alt="" class="photo2">
        <img src="images/cat.png" alt="" class="photo3">
        <img src="images/guitar-bg.jpg" alt="" class="photo4">
        <img src="images/kitten.jpg" alt="" class="photo5">
        <img src="images/tree.png" alt="" class="photo6">
    </div>
</body>
</html>
