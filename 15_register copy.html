<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
</head>
<body>
    <h1>회원 가입을 환영합니다.</h1>
    <form action="">
        <fieldset>
            <legend>사용자 정보</legend>
            <ul>
                <li><label for="">아이디</label><input type="text" id="" autofocus placeholder="4~10자 사이 입력" required></li>
                <li><label for="">이메일</label><input type="text" id="" required></li>
                <li><label for="">비밀번호</label><input type="password" placeholder="문자와 숫자 특수문자를 포함" required></li>
                <li><label for="">비밀번호 확인</label><input type="text" required></li>
                <li><label for="">가입경로</label>
                <select id="path">
                    <option value="blog">블로그</option>
                    <option value="search">검색</option>
                    <option value="sns">SNS</option>
                    <option value="etc">기타</option>
                </select></li>
                <li><label for="memo">메모</label>
                <textarea id="memo" cols="40" rows="4" placeholder="남길 말씀"></textarea></li>
            </ul>
        </fieldset>
        <fieldset>
            <legend>이벤트와 새로운 소식</legend>
            <input type="radio" name="mailing" id="mailing_y" value="mailing_yes"><label for="mailing_y">메일 수신</label>
            <input type="radio" name="mailing" checked><label for="">이메일 수신 안함</label>
        </fieldset>
        <div>
            <input type="submit" value="가입하기">
            <input type="reset" value="취소">
        </div>
    </form>
</body>
</html>
