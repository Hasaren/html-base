<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container1 {
            width: 700px;
            height: 200px;
            display: grid;
            grid-template-areas: 
            "photo1 photo1 photo2"
            "photo1 photo1 photo3";
            gap: 10px;
        }
        .container1 img {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            object-fit: cover;
        }
        .photo1 {
            grid-area: photo1;
        }
        .photo2 {
            grid-area: photo2;
        }
        .photo3 {
            grid-area: photo3;
        }
        @media (min-width:769px) and (max-width:1024px) {
            .container img {
                flex-basis: 49%;
            }
        }
        @media (max-width: 768px) {
            .container img {
                flex-basis: 100%;
            }
            
        }
    </style>
</head>
<body>
    <header>
        <h1>자유주제</h1>
        <p>하위 자유주제</p>
    </header>
    <main>
        <div class="container1">
            <img src="../images/1리락쿠마.jpg" alt="" class="photo1">
            <img src="../images/bear.jpg" alt="" class="photo2">
            <img src="../images/cat.png" alt="" class="photo3">
        </div>
    </main>
    <footer></footer>
</body>
</html>
