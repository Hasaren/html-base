<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            width: 300px;
            display: grid;
            /* grid-template-areas: 
            "box1 box2 box3"
            "box4 box5 box6"
            "box7 box8 box9"; */
            grid-template-rows: repeat(3, 1fr);
            grid-template-columns: repeat(3, 1fr);
            
            gap: 10px;
        }
        .container > div {
            width: 100px;
            height: 100px;
            border: 1px solid #222;
            text-align: center;
        }
        .container > div:nth-child(odd) {
            background-color: aqua;
        }
        .container > div:nth-child(even) {
            background-color: rgb(255, 0, 106);
        }
    </style>
</head>
<body>
    <div class="container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
    </div>
</body>
</html>
