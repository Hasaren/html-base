<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html {
            background-color: #02233b;
        }
        #container {
            background: white;
            background-image: url('./images/mic.png');
            background-repeat: no-repeat;
            background-position: right bottom;
            margin: 20px;
            height: 50rem;
        }
        h1 {
            background-color: #004344;
            text-align: center;
            margin: 20px;
            padding: 20px;
            color: white;
            position: relative;
            top: 20px;
        }
        h2 {
            text-align: center;
            margin: 50px;
        }
        h3 {
            margin-left: 20px;
            color: red;
        }
        ul {
            list-style: none;
            margin-left: 40px;
        }
    </style>
</head>
<body>
    <div id="container">
        <h1>대학언론사 수습기자 모집</h1>
        <h2><em>신입생 여러분을 기다립니다.</em></h2>
        <h3>모집분야</h3>
        <ul>
            <li>아나운서</li>
            <li>프로듀서</li>
            <li>라디오</li>
        </ul>
        <h3>혜택</h3>
        <ul>
            <li>활동비</li>
            <li>장학금</li>
        </ul>
    </div>
</body>
</html>
