<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료수집 실습</title>
</head>
<body>
    <h1>레드향 주문하기</h1>

    <!-- form 태그 -->
    <form action="" autocomplete="off">
        <!-- 폼 안에서 여러 구역을 그룹으로 묶기 -->
        <fieldset>
            <!-- 그룹 제목 -->
            <legend>상품 검색</legend>
            <label>상품<input type="text"></label>
        </fieldset>
        <fieldset>
            <legend>배송 정보</legend>
        </fieldset>
        <!-- label 안에 input 넣기 -->
        <!-- <label for="user-id">아이디(6자 이상)<input id="user-id"></label> -->
        
        <!-- 로그인 폼 만들기 -->
        <label for="user-id">아이디 <input id="user-id" size="10"></label>
        <label for="user-pw">비밀번호 <input type="password" id="user-pw"></label>
        <input type="submit" value="로그인!!">
    </form>
</body>
</html>
