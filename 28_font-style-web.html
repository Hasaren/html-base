<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <!-- 내부 스타일 시트 -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap');
        body {
            background: url('images/1리락쿠마.jpg') no-repeat fixed;
            background-size: cover;
            text-align: center;
        }
        .h {
            font-family: "Nanum Pen Script", cursive;
            font-weight: 400;
            font-style: normal;
        }
        .a {
            font-size: 24px;
            font-weight: 900;
        }
        .i {
            font-style: italic;
            font-weight: 700;
        }

    </style>
</head>
<body>
    <h1 class="h">레드향</h1>
    <!-- inline 스타일 글자 색 바꾸기 -->
    <p> 껍질에 붉은 빛이 돌아 <span class="a">레드향</span>이라 한다. </p>
    <p>레드향은 한라봉과 귤을 교배한 것으로 일반 귤보다 2~3배 크고 과육이 붉고 통통하다.</p>
    <p class="i">비타민 C와 비타민 P가 풍부해 혈액순환, 감기예방 등에 좋은 것으로 알려져있다.</p>

</body>
</html>
